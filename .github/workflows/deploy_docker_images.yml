name: 🐳 Docker Image Deployment

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    name: Push docker images to docker hub
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Processor image
        id: build-processor-docker-image
        run: |
          IMAGE=$(python3 ./services/processor/helper.py image)
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists on Docker Hub. Skipping build."
          else
            make build -C ./services/processor
            make dist -C ./services/processor
          fi
